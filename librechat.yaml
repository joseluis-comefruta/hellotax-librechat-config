#     env:
#       PIPEDRIVE_API_TOKEN: "${PIPEDRIVE_API_TOKEN}"
#       PIPEDRIVE_COMPANY_DOMAIN: "fbahero-aee690"

# File upload config
fileConfig:
  endpoints:
    anthropic:
      fileLimit: 20
      fileSizeLimit: 25
      totalSizeLimit: 100
      supportedMimeTypes:
        - "text/plain"
        - "text/csv"
        - "application/json"
        - "application/pdf"
        - "image/png"
        - "image/jpeg"
        - "image/webp"
  serverFileSizeLimit: 25
  avatarSizeLimit: 2
