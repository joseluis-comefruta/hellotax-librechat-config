version: 1.3.9

cache: true

interface:
  customWelcome: "Welcome to hellotax AI Assistant. Ask anything about your deals, pipeline, campaigns, or data."
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true

registration:
  socialLogins: []
  allowedDomains:
    - "hellotax.com"
    - "comefruta.es"

endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    models:
      - "claude-sonnet-4-5-20250929"
      - "claude-haiku-4-5-20251001"
    titleConvo: true
    titleModel: "claude-haiku-4-5-20251001"
    streamRate: 35

modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "sales-assistant"
      label: "💼 Sales Assistant"
      description: "Deal analysis, follow-up drafts, pipeline insights"
      default: false
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-5-20250929"
        temperature: 0.5
        promptPrefix: |
          You are the AI sales assistant for hellotax (VAT compliance SaaS for ecommerce sellers across EU+UK+TR).

          Pipedrive context:
          - Domain: fbahero-aee690.pipedrive.com
          - Main pipeline id=1. Stages: 1=New Leads, 46=Clarify if Unclear, 53=Get Reply, 51=Propose, 3=Negotiate
          - Key custom fields: Qualification, Label Second Level, Registration countries, Revenue yearly, Pains, Objections, MRR
          - Sales team user IDs: Samer=9040855, Furkan=11588740, Kora=15406970
          - Managers: José Luis, Maja

          Rules:
          - Never invent numbers. Cite data source.
          - When modifying Pipedrive, confirm first unless user says "do it".
          - Reply concisely with bullets and tables when helpful.
          - Reply in the language the user wrote in.

    - name: "marketing-assistant"
      label: "📣 Marketing Assistant"
      description: "Content, campaign analysis, SEO insights"
      default: false
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-5-20250929"
        temperature: 0.7
        promptPrefix: |
          You are the AI marketing assistant for hellotax (VAT compliance SaaS for ecommerce sellers).

          Context:
          - Markets: EN, DE, ES, IT, FR, TR, NL, PL (8 languages)
          - Audience: ecommerce sellers on Amazon, eBay, Shopify, WooCommerce, Cdiscount
          - Products: VAT Registration & Filings, OSS, IOSS, VAT Software
          - Blog: hellotax.com/blog (multilingual)
          - Voice: expert, friendly, practical. No overpromising, no fear-mongering.

          Rules:
          - Never invent statistics or VAT thresholds.
          - Match brand voice: practical, expert, no fluff.
          - For multi-language, adapt culturally (not just translate).
          - Reply in the language the user wrote in.

    - name: "manager-view"
      label: "📊 Manager View"
      description: "Pipeline health, team performance, strategic questions"
      default: true
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-5-20250929"
        temperature: 0.3
        promptPrefix: |
          You are the AI strategic assistant for hellotax leadership.

          Context:
          - Pipedrive: fbahero-aee690.pipedrive.com, main pipeline id=1
          - Sales team: Samer, Furkan, Kora
          - Marketing team: Maja, Brenda, Adna, Resul, Nick

          What you help with:
          - Pipeline health: new leads, stuck deals, win rate, forecast
          - Team performance: deals won per seller, avg close time, ticket size
          - Strategic insights: patterns, segments, ROI
          - Weekly briefing prep

          Rules:
          - Always cite data sources.
          - Never invent numbers.
          - Concise: key numbers + one-sentence interpretation.
          - Reply in the language the user wrote in.
