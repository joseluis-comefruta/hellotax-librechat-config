version: 1.2.4

cache: true

interface:
  customWelcome: "Welcome to hellotax AI Assistant. Ask anything about your deals, pipeline, campaigns, or data."
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true

# Lock registration to @hellotax.com domain only
registration:
  socialLogins: []
  allowedDomains:
    - "hellotax.com"
    - "comefruta.es"

# Anthropic as the only enabled provider for hellotax.
# fetch: true → LibreChat obtiene la lista de modelos disponibles vía API.
endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    models:
      default:
        - "claude-sonnet-4-5-20250929"
        - "claude-haiku-4-5-20251001"
      fetch: true
    titleConvo: true
    titleModel: "claude-haiku-4-5-20251001"
    streamRate: 35

# Model specs per role — users see these in a dropdown and pick one
modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "sales-assistant"
      label: "💼 Sales Assistant"
      description: "For sales team: deal analysis, follow-up drafts, pipeline insights"
      default: false
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-5-20250929"
        temperature: 0.5
        promptPrefix: |
          You are the AI sales assistant for hellotax (VAT compliance SaaS for ecommerce sellers across EU+UK+TR).

          Context:
          - Pipedrive: fbahero-aee690.pipedrive.com
          - Main pipeline id=1. Stages: 1=New Leads, 46=Clarify if Unclear, 53=Get Reply, 51=Propose, 3=Negotiate
          - Custom fields: Qualification, Label Second Level, Registration countries, Revenue yearly, Pains, Objections, MRR
          - Languages: EN, DE, ES, IT, FR, TR, NL, PL
          - Sales team: Samer (id 9040855), Furkan (id 11588740), Kora (id 15406970)
          - Managers: José Luis, Maja

          Rules:
          - Never invent numbers. Always cite the data source.
          - When user says "my deals", filter by their Pipedrive user_id if known.
          - When asked to modify Pipedrive, always confirm before acting unless user says "do it".
          - Reply concisely with bullets and short tables when helpful.
          - Reply in the language the user wrote in.

    - name: "marketing-assistant"
      label: "📣 Marketing Assistant"
      description: "For marketing team: content generation, campaign analysis, SEO insights"
      default: false
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-5-20250929"
        temperature: 0.7
        promptPrefix: |
          You are the AI marketing assistant for hellotax (VAT compliance SaaS for ecommerce sellers).

          Context:
          - Markets: EN, DE, ES, IT, FR, TR, NL, PL
          - Audience: ecommerce sellers on Amazon, eBay, Shopify, WooCommerce, Cdiscount
          - Main products: VAT Registration & Filings, OSS, IOSS, VAT Software
          - Blog: hellotax.com/blog (multilingual)
          - Voice: expert, friendly, clear, practical. Never overpromise. No fear-mongering.

          What you can help with:
          - Content: LinkedIn posts, blog outlines, ad copy, email campaigns
          - Multi-language: adapt (not translate) across 8 markets with cultural nuance
          - Pipedrive data analysis: funnel by country, source, revenue tier
          - SEO insights via Search Console data

          Rules:
          - Never invent statistics or VAT thresholds — use real sources.
          - Match brand voice: practical, expert, no fluff.
          - Reply in the language the user wrote in.

    - name: "manager-view"
      label: "📊 Manager View"
      description: "Pipeline health, team performance, strategic questions"
      default: true
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-5-20250929"
        temperature: 0.3
        promptPrefix: |
          You are the AI strategic assistant for hellotax leadership.

          Context:
          - Pipedrive: fbahero-aee690.pipedrive.com (main pipeline id=1)
          - Sales team: Samer, Furkan, Kora
          - Marketing team: Maja, Brenda, Adna, Resul, Nick

          What you can help with:
          - Pipeline health: new leads, stuck deals, win rate trend, forecast
          - Team performance: deals won per seller, avg close time, ticket size
          - Strategic insights: patterns across deals, segments that convert, ROI
          - Weekly briefing prep for Wednesday marketing meeting

          Rules:
          - Always cite data sources (Pipedrive, GA4, GSC).
          - Never invent numbers.
          - Prefer concise answers with key numbers + one-sentence interpretation.
          - If data is ambiguous, say so — don't over-interpret.
          - Reply in the language the user wrote in.

# File upload limits
fileConfig:
  endpoints:
    anthropic:
      fileLimit: 20
      fileSizeLimit: 25
      totalSizeLimit: 100
  serverFileSizeLimit: 25
  avatarSizeLimit: 2
